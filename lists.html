<!DOCTYPE html>
<html lang="en">

        <title>Lists</title>
        <meta name="description" content="Lists" />
        <link rel="icon" href="https://github.com/seiverlauth/seiverlauth.github.io/blob/master/fav.png?raw=true" type="image/png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#ffffff" />
        <link rel="stylesheet" href="https://use.typekit.net/pjo4see.css" />
        <style>
          body {
            margin: 0;
            padding: 2em;
            font-family: ibm-plex-mono, sans-serif;
            font-weight: 400;
            font-style: normal;
            font-size: 15px;
            line-height: 1.2;
            background-color: #f3f4f1;
          }
          h1,h2,h3,p { padding: 0; margin: 0; font-size: 1em; font-weight: normal; }
          h1 { margin: 0 0 1em 0; }
          a { color: #000; text-decoration: none; }
          a:hover { text-decoration: underline; }
          header, main, footer { width: 30em; max-width: 100%; }
          header:after, main:after { content: ""; display: block; margin: 1em 0; }
          footer:before { content: "--"; }
          footer { margin: 1em 0 2em 0; }

          .list-item { margin-bottom: 1em; }

          .list-toggle {
            cursor: pointer;
            user-select: none;
          }

          .list-toggle:hover { text-decoration: underline; }

          .list-content {
            display: none;
            margin-top: 0.5em;
            margin-left: 1.2em;
            line-height: 1.6;
          }

          .list-content.open { display: block; }

          .list-content p { margin: 0.2em 0; }

          .list-content p:before { content: "⮑ "; }

          .subheading {
            margin-top: 0.6em;
            margin-bottom: 0.2em;
            text-decoration: underline;
          }

          .list-content p.subheading:before { content: none; }
        </style>
    </head>
    <body>

        </header>

            <p>&copy; 2026 SML</p>

                        "The chop in pork chop comes from the act of chopping through bone with a cleaver",
                        "The Hoosier etymology is genuinely unknown despite scholarly research"
                    ]
                }
            ];

            function buildLists() {
                const container = document.getElementById('listsContainer');

                lists.forEach(list => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'list-item';

                    const toggle = document.createElement('p');
                    toggle.className = 'list-toggle';
                    toggle.textContent = list.title;

                    const content = document.createElement('div');
                    content.className = 'list-content';

                    if (list.sections) {
                        list.sections.forEach(section => {
                            const heading = document.createElement('p');
                            heading.className = 'subheading';
                            heading.textContent = section.heading;
                            content.appendChild(heading);

                            section.items.forEach(item => {
                                const p = document.createElement('p');
                                p.textContent = item;
                                content.appendChild(p);
                            });
                        });
                    } else {
                        list.items.forEach(item => {
                            const p = document.createElement('p');
                            p.textContent = item;
                            content.appendChild(p);
                        });
                    }

                    toggle.addEventListener('click', () => {
                        const isOpen = content.classList.contains('open');
                        document.querySelectorAll('.list-content').forEach(el => el.classList.remove('open'));
                        if (!isOpen) content.classList.add('open');
                    });

                    wrapper.appendChild(toggle);
                    wrapper.appendChild(content);
                    container.appendChild(wrapper);
                });
            }

            buildLists();
        </script>
    </body>
</html>
